<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc-Avg | Version 3.1 Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="dashboard-container">
        <header>
            <h1 class="gradient-text">Calc-Avg Dashboard</h1>
            <p>High-Performance C Engine • Version 3.1</p>
        </header>

        <section class="glass-panel input-section">
            <h2>Data Input Portal</h2>
            <form id="calc-form">
                <div class="input-group">
                    <label for="data-input">Enter numerical data (comma-separated):</label>
                    <input type="text" id="data-input" placeholder="e.g. 15.2, 42.8, 99.1, 7" required autocomplete="off">
                </div>
                
                <div class="input-group">
                    <label for="operation-select">Calculation Mode:</label>
                    <select id="operation-select">
                        <option value="mean">Arithmetic Mean (Average)</option>
                        <option value="all">Comprehensive Analysis (Mean, Median, Mode, Variance, Std Dev)</option>
                    </select>
                </div>

                <button type="submit" class="glow-button">
                    <span>Initialize C Engine</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </form>
        </section>

        <div id="results-container" class="hidden">
            <section class="glass-panel stats-section">
                <h2>Mathematical Results</h2>
                <div id="stats-grid" class="stats-grid">
                    <!-- Dynamic stats injected here -->
                </div>
            </section>

            <section class="glass-panel chart-section">
                <h2>Data Visualization</h2>
                <div class="chart-container">
                    <canvas id="dataChart"></canvas>
                </div>
            </section>
        </div>
        
        <footer>
            <p>&copy; Copyright Sanskar. All rights reserved. <a href="https://github.com/sanskarIN/Calc-Avg" target="_blank">View on GitHub</a></p>
        </footer>
    </main>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
