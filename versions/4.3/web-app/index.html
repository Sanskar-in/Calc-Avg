<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calc-Avg v4.3 | WebSocket Expansion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="glass-container">
        <header>
            <div class="brand">
                <h1>Calc-Avg <span class="version">v4.3</span></h1>
                <p>The Unified API Engine (Powered by C)</p>
            </div>
            <nav class="tabs">
                <button class="tab-btn active" data-tab="tab-stats">Statistics</button>
                <button class="tab-btn" data-tab="tab-ai">Predictive AI</button>
                <button class="tab-btn" data-tab="tab-finance">Financial SMA</button>
                <button class="tab-btn" data-tab="tab-calculus">Calculus</button>
                <button class="tab-btn" data-tab="tab-crypto">Crypto</button>
                <button class="tab-btn" data-tab="tab-compress">Compression</button>
                <button class="tab-btn" data-tab="tab-stream" style="color: #f43f5e; font-weight: bold;">🔴 Live Stream</button>
            </nav>
        </header>

        <main>
            <!-- Tab 7: WebSocket Stream -->
            <section id="tab-stream" class="tab-content">
                <div class="data-form" style="text-align: center;">
                    <button id="start-stream-btn" class="glow-btn ai-btn">Connect to C WebSocket Server</button>
                    <button id="stop-stream-btn" class="glow-btn" style="background: rgba(244, 63, 94, 0.2); border-color: #f43f5e; display: none;">Disconnect Stream</button>
                </div>
                <div id="stream-results" class="results-container hidden">
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-title">Status</div><div class="stat-value" id="ws-status" style="color: #10b981">Connected (20Hz)</div></div>
                        <div class="stat-card"><div class="stat-title">Current Y-Value</div><div class="stat-value" id="ws-yval" style="color: #38bdf8">0.00</div></div>
                    </div>
                    <div class="chart-wrapper">
                        <canvas id="streamChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tab 1: Stats -->
            <section id="tab-stats" class="tab-content active">
                <form id="stats-form" class="data-form">
                    <label>Enter Dataset (comma-separated):</label>
                    <input type="text" id="stats-data" placeholder="e.g. 85, 92, 78, 90, 88" required autocomplete="off">
                    <button type="submit" class="glow-btn">Calculate Core Stats</button>
                </form>
                <div id="stats-results" class="results-container hidden">
                    <div class="stats-grid" id="stats-grid-container"></div>
                    <div class="chart-wrapper">
                        <canvas id="statsChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tab 2: Predictive AI -->
            <section id="tab-ai" class="tab-content">
                <form id="ml-form" class="data-form">
                    <label>Enter Historical Data (comma-separated):</label>
                    <input type="text" id="ml-data" placeholder="e.g. 10, 15, 20, 25, 30" required autocomplete="off">
                    <label>Future Periods to Predict:</label>
                    <input type="number" id="ml-future" value="3" min="1" max="50" required>
                    <button type="submit" class="glow-btn ai-btn">Train AI & Forecast</button>
                </form>
                <div id="ml-results" class="results-container hidden">
                    <div id="ml-equation" class="equation-box"></div>
                    <div class="chart-wrapper">
                        <canvas id="mlChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tab 3: Finance SMA -->
            <section id="tab-finance" class="tab-content">
                <form id="sma-form" class="data-form">
                    <label>Enter Asset Prices (comma-separated):</label>
                    <input type="text" id="sma-data" placeholder="e.g. 150, 152, 149, 155, 160, 158" required autocomplete="off">
                    <label>Moving Average Window (Days):</label>
                    <input type="number" id="sma-window" value="3" min="2" max="100" required>
                    <button type="submit" class="glow-btn finance-btn">Calculate SMA</button>
                </form>
                <div id="sma-results" class="results-container hidden">
                    <div class="chart-wrapper">
                        <canvas id="smaChart"></canvas>
                    </div>
                </div>
            </section>

        </div>
        
        <footer class="app-footer">
            <p>&copy; Copyright Sanskar. All rights reserved. <br> Powered by Client-Side WebAssembly & JS <br>
            <a href="https://github.com/Sanskar-in/Calc-Avg" target="_blank">View Project on GitHub</a></p>
        </footer>
    </main>

    <!-- JS Math Engine -->
    <script src="script.js"></script>
</body>
</html>
