name: Calc-Avg Cross-Platform CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
    - uses: actions/checkout@v3

    # Windows Compilation (Requires MSYS2 / MinGW to compile resource files properly)
    - name: Set up MinGW
      if: runner.os == 'Windows'
      uses: egor-tensin/setup-mingw@v2
      with:
        platform: x64

    - name: Compile on Windows
      if: runner.os == 'Windows'
      run: mingw32-make

    # UNIX Compilation (Ubuntu / macOS)
    - name: Compile on Linux & macOS
      if: runner.os != 'Windows'
      run: make

    - name: Verify Executable Exists (UNIX)
      if: runner.os != 'Windows'
      run: test -f calc_avg

    - name: Verify Executable Exists (Windows)
      if: runner.os == 'Windows'
      run: |
        if (!(Test-Path calc_avg.exe)) { exit 1 }
